version: '3.8'

services:
  web:
    build: 
      context: ./web
    ports:
      - "80:80"
    environment:
      - DB_HOST=db
      - DB_USER=nvtech_user
      - DB_PASSWORD=nvtech_pass
      - DB_NAME=gateway_db
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=gateway_db
      - MYSQL_USER=nvtech_user
      - MYSQL_PASSWORD=nvtech_pass
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
